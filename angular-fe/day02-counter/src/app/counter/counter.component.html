<div class="counter-container">
  <h1>Counter: {{ counter }}</h1>
  <button (click)="increment()">Increment</button>
  <button (click)="decrement()">Decrement</button>

  <div [ngClass]="getCounterStatus()">
    <span>This counter is </span>
    @switch (getCounterStatus()){
      @case ("positive") { <span class="inner-span">positive</span> }
      @case ("neutral") { <span class="inner-span">neutral</span> }
      @case ("negative") { <span class="inner-span">negative</span> }
    }
    <span>.</span>
  </div>

</div>
