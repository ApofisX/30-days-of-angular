<div class="todo-container">
  <h2>To-Do List</h2>

  <input type="text"
         [(ngModel)]="newTask"
         placeholder="Enter new task"
         (keyup.enter)="addTask()"
         (keydown)="checkKey($event)" >

  <button (click)="addTask()">Add Task</button>

  @if (tasks.length === 0) {
    <p>No tasks available. Add new task!</p>
  } @else {
    <ul>
      @for (task of tasks; track task; let i = $index) {
        <li>
          {{ task }}
          <button (click)="removeTask(i)">Remove</button>
        </li>
      }
    </ul>
  }
</div>
